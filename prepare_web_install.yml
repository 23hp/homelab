# prepare_web_install.yml
---
- name: Setup DHCP boot
  tags: [never]
  hosts: openwrt
  gather_facts: false
  tasks:
    - name: Include PXE server setup task
      ansible.builtin.include_role:
        name: router
        tasks_from: setup_dhcp_boot

- name: Setup HTTP & TFTP server
  hosts: asuswrt
  gather_facts: false
  tasks:
    - name: Include server setup tasks
      ansible.builtin.include_role:
        name: router
        tasks_from: "{{ task }}"
      loop_control:
        loop_var: task
      loop:
        - setup_http_server
        - setup_pxe_server
    - name: Generate EFI URL
      ansible.builtin.include_role:
        name: talos
        tasks_from: get_image_urls
    - name: Download Secure Boot UKI image
      ansible.builtin.get_url:
        url: "{{ talos_efi_url }}"
        dest: "{{ router_web_root }}/boot.efi"
        mode: '0644'
        timeout: 60
