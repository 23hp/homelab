---
- name: Upload file to Memory
  ansible.builtin.template:
    src: "{{ router_file_src }}"
    dest: "/tmp/{{ router_file_relative_path }}"
    mode: "0644"

- name: Create symbolic link in Web root
  ansible.builtin.file:
    src: /tmp/{{ router_file_relative_path }}
    dest: "{{ router_web_root }}/{{ router_file_relative_path }}"
    state: link
    force: true
