# roles/setup/tasks/main.yml
- name: Allow rootless Podman containers to run at boot
  ansible.builtin.command: "loginctl enable-linger {{ ansible_facts['user_id'] }}"
  args:
    creates: "/var/lib/systemd/linger/{{ ansible_facts['user_id'] }}"

- name: Disable network checking for faster container startup
  ansible.builtin.systemd:
    name: podman-user-wait-network-online.service
    masked: true
    scope: user

- name: Make Podman container Auto-Update possible
  ansible.builtin.systemd:
    name: podman-auto-update.timer
    state: started
    enabled: true
    scope: user

- name: Enable Traefik discover others containers via Podman socket
  ansible.builtin.systemd:
    name: podman.socket
    state: started
    enabled: true
    scope: user

- name: Create Podman configuration directory
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.config/containers"
    state: directory
    mode: '0700'

- name: Set up journald as the global LogDriver
  community.general.ini_file:
    path: "{{ ansible_facts['user_dir'] }}/.config/containers/containers.conf"
    section: containers
    option: log_driver
    value: '"journald"'
    mode: '0644'

- name: Configure Podman registries
  ansible.builtin.copy:
    dest: "{{ ansible_facts['user_dir'] }}/.config/containers/registries.conf"
    mode: '0600'
    content: |
      unqualified-search-registries = {{ unqualified_registries | to_json }}
      short-name-mode = "enforcing"
  vars:
    unqualified_registries:
      - docker.io
      - quay.io
      - ghcr.io
