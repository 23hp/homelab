---
# Operation control
talos_tasks:
  - install.yaml
  - upgrade.yaml
  - patch.yaml
talos_patches:
  - network_config.yaml
  - storage_tweak.yaml
  - custom_auth.yaml

talos_cluster_name: "homelab"
talos_node_ip: "192.168.10.3"
talos_device_arch: "amd64"
talos_install_disk: "/dev/nvme0n1"
talos_kernel: "vmlinuz-{{ talos_device_arch }}"
talos_initrd: "initramfs-{{ talos_device_arch }}.xz"
talos_ipxe_folder: "/tmp"
talos_image_folder: "/tmp"

# Generated values
talos_version: v1.12.6
talos_k8s_version: v1.35.3
talos_schematic_id: ""
talos_image_url: "factory.talos.dev/metal-installer/{{ talos_schematic_id }}:{{ talos_version }}"
talos_config_path: "roles/talos/.talos_config"
