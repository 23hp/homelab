---
- name: Get Talos version
  ansible.builtin.include_tasks: get_version.yml

- name: Submit configuration to Image Factory for Schematic ID
  ansible.builtin.uri:
    url: https://factory.talos.dev/schematics
    method: POST
    status_code: 201
    src: "extensions.yaml"
    body_format: raw
    headers:
      Content-Type: "application/yaml"
  register: schematic_res
  retries: 3
  delay: 5
  until: schematic_res.status == 201

- name: Set image URLs
  ansible.builtin.set_fact:
    talos_efi_url: "https://factory.talos.dev/image/{{ schematic_res.json.id }}/{{ talos_version }}/metal-amd64-secureboot-uki.efi"
    talos_installer_url: "factory.talos.dev/metal-installer-secureboot/{{ schematic_res.json.id }}:{{ talos_version }}"
