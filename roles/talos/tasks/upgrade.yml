---
- name: Get Talos image url
  ansible.builtin.include_tasks: get_image_urls.yml

- name: Execute talosctl upgrade with custom image
  ansible.builtin.command:
    cmd: "talosctl upgrade --image {{ talos_installer_url }} --wait"

- name: Wait for node to be healthy
  ansible.builtin.command:
    cmd: "talosctl health --wait-timeout 10m"
