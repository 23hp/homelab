log:
  level: ERROR
# api:
#   # Dashboard
#   dashboard: true
#   insecure: true
http:
  middlewares:
    # 高强度安全响应头
    security-headers:
      headers:
        # HSTS (强制浏览器在未来2年内仅通过 HTTPS 访问)
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        # 防止点击劫持
        frameDeny: true
        # 禁止浏览器猜测内容类型 (MIME-sniffing)
        contentTypeNosniff: true
        # 隐私：隐藏 Referer 来源信息
        referrerPolicy: "same-origin"

tls:
  certResolver: letsencrypt
  domains:
    - main: "{{ env `DOMAIN_NAME` }}"
      sans: [ "*.{{ env `DOMAIN_NAME` }}" ]
  options:
    default:
      # 强制使用 TLS 1.3 (目前最安全的版本，减少握手时的明文信息)
      minVersion: VersionTLS13
      # 开启严格 SNI (防止未经授权的证书探测扫描)
      sniStrict: true

certificatesresolvers:
  letsencrypt:
    acme:
      email: "{{ env `ACME_EMAIL` }}"
      storage: "/letsencrypt/acme.json"
      dnsChallenge:
        provider: cloudflare